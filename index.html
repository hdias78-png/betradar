<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4Kbet</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0d0d1a" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d1a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding-bottom: 60px; }
    header { background: linear-gradient(135deg, #0d0d1a, #1a1a3e); border-bottom: 1px solid rgba(0,255,136,0.15); padding: 16px 16px 12px; text-align: center; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 26px; font-weight: 900; letter-spacing: 2px; color: #00ff88; }
    .logo span { color: #fff; }
    .subtitle { font-size: 10px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }
    .date-badge { display: inline-block; background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.2); border-radius: 20px; padding: 3px 12px; font-size: 10px; color: #00ff88; margin-top: 8px; }
    .tabs { display: flex; background: #111122; border-bottom: 1px solid rgba(255,255,255,0.06); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { flex: 0 0 auto; padding: 11px 10px; text-align: center; font-size: 9px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: #444; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
    .tab.active { color: #00ff88; border-bottom-color: #00ff88; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .container { max-width: 480px; margin: 0 auto; padding: 14px; }
    .section-title { font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #00ff88; margin: 20px 0 10px 2px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(0,255,136,0.15); }
    .match-card { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 14px; margin-bottom: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: transform 0.2s; }
    .match-card:hover { transform: translateY(-2px); border-color: rgba(0,255,136,0.25); }
    .match-card .league { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #666; margin-bottom: 6px; }
    .match-card .teams { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 12px; }
    .match-card .form-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .match-card .team-name { min-width: 90px; max-width: 100px; font-weight: 600; color: #ccc; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .match-card .form { font-size: 13px; letter-spacing: 2px; }
    .match-card .goals-info { font-size: 10px; color: #555; }
    .divider { height: 1px; background: rgba(255,255,255,0.05); margin: 10px 0; }
    .stats { display: flex; gap: 8px; }
    .stat-pill { flex: 1; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px 8px; text-align: center; border: 1px solid rgba(255,255,255,0.06); }
    .stat-pill.sure { border-color: rgba(0,255,136,0.35); }
    .stat-pill.bon  { border-color: rgba(255,200,0,0.35); }
    .stat-pill.ok   { border-color: rgba(255,100,100,0.2); }
    .stat-pill .label { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #555; margin-bottom: 4px; }
    .stat-pill .value { font-size: 22px; font-weight: 900; line-height: 1; }
    .stat-pill.sure .value { color: #00ff88; }
    .stat-pill.bon .value  { color: #ffc800; }
    .stat-pill.ok .value   { color: #ff6464; }
    .stat-pill .badge { font-size: 10px; margin-top: 3px; color: #888; }
    .match-time { font-size: 10px; color: #444; text-align: right; margin-top: 8px; }
    .loader { text-align: center; padding: 50px 20px; color: #555; font-size: 13px; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(0,255,136,0.1); border-top-color: #00ff88; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { background: rgba(255,80,80,0.07); border: 1px solid rgba(255,80,80,0.2); border-radius: 14px; padding: 20px; text-align: center; color: #ff6464; font-size: 13px; margin-top: 16px; }
    .error-box button { margin-top: 12px; background: rgba(255,80,80,0.15); border: 1px solid rgba(255,80,80,0.3); color: #ff6464; border-radius: 8px; padding: 7px 18px; font-size: 12px; cursor: pointer; }
    .empty-box { text-align: center; padding: 50px 20px; color: #444; font-size: 13px; }
    .refresh-btn { display: block; width: 100%; margin-top: 20px; background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.2); color: #00ff88; border-radius: 10px; padding: 11px; font-size: 12px; font-weight: 700; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; }
    .refresh-btn:hover { background: rgba(0,255,136,0.15); }

    /* CHINA */
    .china-header { background: linear-gradient(135deg, #1a0a0a, #2e0a0a); border: 1px solid rgba(255,50,50,0.3); border-radius: 14px; padding: 16px; text-align: center; margin-bottom: 16px; }
    .china-header .ch-title { font-size: 18px; font-weight: 900; color: #ff4444; letter-spacing: 2px; }
    .china-header .ch-sub { font-size: 11px; color: #888; margin-top: 4px; }
    .china-badge { display: inline-block; background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.3); border-radius: 6px; padding: 2px 7px; font-size: 9px; font-weight: 700; color: #ff6464; letter-spacing: 1px; margin-left: 6px; }

    /* EUROPE */
    .euro-header { background: linear-gradient(135deg, #0a1a2e, #1a0a2e); border: 1px solid rgba(100,100,255,0.3); border-radius: 14px; padding: 16px; text-align: center; margin-bottom: 16px; }
    .euro-header .eu-title { font-size: 18px; font-weight: 900; color: #6464ff; letter-spacing: 2px; }
    .euro-header .eu-sub { font-size: 11px; color: #888; margin-top: 4px; }
    .league-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .filter-btn { padding: 5px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: #888; font-size: 10px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .filter-btn.active { border-color: rgba(100,100,255,0.5); color: #aaaaff; background: rgba(100,100,255,0.1); }

    /* NEWS */
    .news-header { background: linear-gradient(135deg, #0a1a0a, #1a1a0a); border: 1px solid rgba(255,200,0,0.3); border-radius: 14px; padding: 16px; text-align: center; margin-bottom: 16px; }
    .news-header .nw-title { font-size: 18px; font-weight: 900; color: #ffc800; letter-spacing: 2px; }
    .news-header .nw-sub { font-size: 11px; color: #888; margin-top: 4px; }
    .news-card { background: linear-gradient(135deg, #16160a, #1a1a0d); border: 1px solid rgba(255,200,0,0.12); border-radius: 12px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; text-decoration: none; display: block; }
    .news-card:hover { border-color: rgba(255,200,0,0.35); transform: translateY(-1px); }
    .news-card .news-source { font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #ffc800; margin-bottom: 6px; }
    .news-card .news-title { font-size: 13px; font-weight: 700; color: #fff; line-height: 1.4; margin-bottom: 6px; }
    .news-card .news-desc { font-size: 11px; color: #666; line-height: 1.5; }
    .news-card .news-date { font-size: 10px; color: #444; text-align: right; margin-top: 8px; }
    .source-badge { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 9px; font-weight: 700; margin-right: 6px; }
    .source-lequipe  { background: rgba(255,50,50,0.15);  color: #ff6464; border: 1px solid rgba(255,50,50,0.3); }
    .source-abola    { background: rgba(0,200,255,0.1);   color: #00c8ff; border: 1px solid rgba(0,200,255,0.2); }
    .source-gazzetta { background: rgba(255,150,0,0.1);   color: #ff9600; border: 1px solid rgba(255,150,0,0.3); }

    /* WC */
    .wc-banner { background: linear-gradient(135deg, #1a0a2e, #2e1a0a); border: 1px solid rgba(255,180,0,0.3); border-radius: 14px; padding: 18px; text-align: center; margin-bottom: 18px; }
    .wc-banner .wc-title { font-size: 18px; font-weight: 900; color: #ffc800; letter-spacing: 2px; }
    .wc-banner .wc-subtitle { font-size: 11px; color: #888; margin-top: 4px; }
    .wc-banner .wc-countdown { font-size: 13px; color: #ffc800; margin-top: 8px; font-weight: 700; }
    .group-title { font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #ffc800; margin: 18px 0 8px 2px; display: flex; align-items: center; gap: 8px; }
    .group-title::after { content: ''; flex: 1; height: 1px; background: rgba(255,200,0,0.15); }
    .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 6px; }
    .team-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 8px 10px; display: flex; align-items: center; gap: 7px; cursor: pointer; transition: all 0.2s; }
    .team-card:hover { border-color: rgba(255,200,0,0.4); background: rgba(255,200,0,0.05); }
    .team-card .team-flag { font-size: 18px; }
    .team-card .team-info { flex: 1; }
    .team-card .team-name-wc { font-size: 11px; font-weight: 700; color: #fff; }
    .team-card .team-strength { font-size: 9px; color: #888; margin-top: 1px; }
    .over05-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 5px; white-space: nowrap; }
    .over05-badge.sure { background: rgba(0,255,136,0.1); color: #00ff88; border: 1px solid rgba(0,255,136,0.2); }
    .over05-badge.bon  { background: rgba(255,200,0,0.1); color: #ffc800; border: 1px solid rgba(255,200,0,0.3); }
    .over05-badge.ok   { background: rgba(255,100,100,0.1); color: #ff6464; border: 1px solid rgba(255,100,100,0.2); }

    /* SIMULATOR */
    .sim-banner { background: linear-gradient(135deg, #0a1a2e, #0a2e1a); border: 1px solid rgba(0,200,255,0.3); border-radius: 14px; padding: 18px; text-align: center; margin-bottom: 18px; }
    .sim-banner .sim-title { font-size: 18px; font-weight: 900; color: #00c8ff; letter-spacing: 2px; }
    .sim-banner .sim-sub { font-size: 11px; color: #888; margin-top: 4px; }
    .team-select-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
    .team-select-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 9px; padding: 9px 5px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .team-select-btn:hover { border-color: rgba(0,200,255,0.4); background: rgba(0,200,255,0.05); }
    .team-select-btn .flag { font-size: 20px; }
    .team-select-btn .name { font-size: 9px; color: #ccc; font-weight: 700; margin-top: 3px; }
    .path-tracker { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
    .path-step { background: rgba(0,200,255,0.05); border: 1px solid rgba(0,200,255,0.15); border-radius: 7px; padding: 3px 8px; font-size: 9px; color: #555; font-weight: 700; }
    .path-step.done    { background: rgba(0,255,136,0.08); border-color: rgba(0,255,136,0.2); color: #00ff88; }
    .path-step.current { background: rgba(0,200,255,0.15); border-color: #00c8ff; color: #00c8ff; }
    .sim-step { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
    .sim-step .step-label { font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #00c8ff; margin-bottom: 8px; }
    .result-btns { display: flex; gap: 7px; margin-top: 10px; }
    .result-btn { flex: 1; padding: 9px 5px; border-radius: 9px; border: none; font-size: 10px; font-weight: 800; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; text-transform: uppercase; }
    .result-btn.win  { background: rgba(0,255,136,0.15); color: #00ff88; border: 1px solid rgba(0,255,136,0.3); }
    .result-btn.draw { background: rgba(255,200,0,0.1);  color: #ffc800; border: 1px solid rgba(255,200,0,0.3); }
    .result-btn.loss { background: rgba(255,80,80,0.1);  color: #ff6464; border: 1px solid rgba(255,80,80,0.3); }
    .result-btn:hover { transform: scale(1.03); }
    .sim-result { background: linear-gradient(135deg, #1a2e1a, #0d1a0d); border: 1px solid rgba(0,255,136,0.3); border-radius: 12px; padding: 22px; text-align: center; margin-top: 8px; }
    .sim-result .trophy { font-size: 48px; margin-bottom: 10px; }
    .sim-result .result-title { font-size: 17px; font-weight: 900; color: #00ff88; }
    .sim-result .result-sub { font-size: 11px; color: #888; margin-top: 5px; }
    .sim-result .path-summary { margin-top: 14px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 9px; text-align: left; }
    .sim-result .restart-btn { margin-top: 14px; background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); color: #00ff88; border-radius: 9px; padding: 9px 22px; font-size: 12px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <div class="logo">4K<span>bet</span></div>
  <div class="subtitle">Paris intelligents du jour</div>
  <div class="date-badge" id="date-badge">Chargement...</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('paris')">🎯 Paris</div>
  <div class="tab"        onclick="showTab('europe')">🏆 Europe</div>
  <div class="tab"        onclick="showTab('china')">🇨🇳 Chine</div>
  <div class="tab"        onclick="showTab('worldcup')">🌍 CdM</div>
  <div class="tab"        onclick="showTab('simulator')">🎮 Sim.</div>
  <div class="tab"        onclick="showTab('news')">📰 Actu</div>
</div>

<!-- PARIS DU JOUR -->
<div id="tab-paris" class="tab-content active">
  <div class="container">
    <div id="matches
