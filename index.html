<script>
const API_KEY = "04b25e0b04144451abb6e47aed171ea4";
const LEAGUES = {
  "PL":  {name:"Premier League",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",id:2021},
  "FL1": {name:"Ligue 1",flag:"🇫🇷",id:2015},

  "PPL": {name:"Liga NOS",flag:"🇵🇹",id:2017},
  "CL":  {name:"Champions L.",flag:"🏆",id:2001}
};
const WC_TEAMS = {
  "UEFA":["France","Angleterre","Espagne","Portugal","Allemagne","Pays-Bas","Belgique","Croatie","Norvège","Écosse","Suisse","Autriche","Suède","Turquie","Bosnie","Tchéquie"],
  "CAF":["Maroc","Algérie","Sénégal","Égypte","Tunisie","Côte d'Ivoire","Ghana","Afrique du Sud","Cap-Vert","RD Congo"],
  "CONMEBOL":["Argentine","Brésil","Colombie","Uruguay","Équateur","Paraguay"],
  "AFC":["Japon","Corée du Sud","Iran","Australie","Arabie Saoudite","Qatar","Ouzbékistan","Jordanie","Irak"],
  "CONCACAF":["États-Unis 🏠","Canada 🏠","Mexique 🏠","Panama","Haïti","Curaçao"]
};
const CONF_FLAGS = {"UEFA":"🇪🇺","CAF":"🌍","CONMEBOL":"🌎","AFC":"🌏","CONCACAF":"🌎"};
let liveInterval = null;
let currentTab = "today";
let allMatches = [];

document.addEventListener("DOMContentLoaded", () => {
  initApp();
  renderCDM();
  updateCDMCountdown();
});

async function initApp() {
  await loadMatches();
  startLivePolling();
  if ("Notification" in window && Notification.permission === "default") Notification.requestPermission();
}

async function apiFetch(path) {
  const target = `https://api.football-data.org/v4/${path}`;
  const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`;
  const res = await fetch(proxyUrl, {
    headers: {"X-Auth-Token": API_KEY}
  });
  if (!res.ok) throw new Error(`Erreur API ${res.status}`);
  return res.json();
}

async function loadMatches() {
  try {
    const today = new Date().toISOString().split("T")[0];
    const data = await apiFetch(`matches?date=${today}`);
    const leagueIds = Object.values(LEAGUES).map(l => l.id);
    allMatches = (data.matches || []).filter(m => leagueIds.includes(m.competition?.id));
    processAndRender();
    document.getElementById("last-update").textContent = "Mis à jour " + new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  } catch(e) {
    document.getElementById("today-matches").innerHTML = `<div class="glass rounded-xl p-6 text-center"><div class="text-3xl mb-2">⚠️</div><div class="text-red-400 font-bold">${e.message}</div></div>`;
  }
}

async function analyzeMatch(match) {
  try {
    const [homeData, awayData] = await Promise.all([
      apiFetch(`teams/${match.homeTeam.id}/matches?status=FINISHED&limit=6`),
      apiFetch(`teams/${match.awayTeam.id}/matches?status=FINISHED&limit=6`)
    ]);
    const hm = (homeData.matches||[]).slice(0,6);
    const am = (awayData.matches||[]).slice(0,6);
    const homeGoals = hm.map(m => m.homeTeam.id===match.homeTeam.id ? m.score.fullTime.home : m.score.fullTime.away);
    const awayGoals = am.map(m => m.awayTeam.id===match.awayTeam.id ? m.score.fullTime.away : m.score.fullTime.home);
    const homeForm = hm.map(m => {
      const isHome = m.homeTeam.id===match.homeTeam.id;
      const tg = isHome?m.score.fullTime.home:m.score.fullTime.away;
      const og = isHome?m.score.fullTime.away:m.score.fullTime.home;
      return tg>og?"W":tg===og?"D":"L";
    });
    const awayForm = am.map(m => {
      const isAway = m.awayTeam.id===match.awayTeam.id;
      const tg = isAway?m.score.fullTime.away:m.score.fullTime.home;
      const og = isAway?m.score.fullTime.home:m.score.fullTime.away;
      return tg>og?"W":tg===og?"D":"L";
    });
    const hsc = homeGoals.filter(g=>g>0).length;
    const asc = awayGoals.filter(g=>g>0).length;
    const hAvg = homeGoals.reduce((a,b)=>a+b,0)/(homeGoals.length||1);
    const aAvg = awayGoals.reduce((a,b)=>a+b,0)/(awayGoals.length||1);
    const avg = (hAvg+aAvg)/2;
    const hStreak = homeForm.filter(r=>r==="W").length;
    const aStreak = awayForm.filter(r=>r==="W").length;
    let confidence = 50, picks = [];
    if(hsc>=5&&asc>=5){confidence=Math.min(confidence+40,99);picks.push({type:"Over 0.5",badge:"green",icon:"⚽"});}
    else if(hsc>=4&&asc>=4){confidence=Math.min(confidence+25,90);picks.push({type:"Over 0.5",badge:"cyan",icon:"⚽"});}
    if(avg>=2.5) picks.push({type:"Over 1.5",badge:"yellow",icon:"🎯"});
    if(hStreak>=4) picks.push({type:"Victoire "+match.homeTeam.shortName,badge:"cyan",icon:"🏆"});
    if(aStreak>=4) picks.push({type:"Victoire "+match.awayTeam.shortName,badge:"cyan",icon:"🏆"});
    return {...match,confidence,picks,homeForm,awayForm,homeAvgGoals:hAvg,awayAvgGoals:aAvg};
  } catch(e) {
    return {...match,confidence:50,picks:[],homeForm:[],awayForm:[],homeAvgGoals:0,awayAvgGoals:0};
  }
}

  document.getElementById("today-matches").innerHTML = `<div class="flex justify-center py-8"><div class="spinner"></div></div>`;
  const analyzed = await Promise.all(allMatches.map(analyzeMatch));
  analyzed.sort((a,b)=>b.confidence-a.confidence);

  const soirM = analyzed.filter(m=>{

  });
  const todayM = analyzed.filter(m=>m.status!=="IN_PLAY"&&m.status!=="PAUSED");
  renderMatchList(document.getElementById("today-matches"), todayM, "Aucun match programmé aujourd'hui");
  renderMatchList(document.getElementById("soir-matches"), soirM,
