// ===== GROUPES OFFICIELS CdM 2026 =====

  "Groupe F": [

    { name: "Iran",           flag: "ir", over05: 83, strength: 63 },
    { name: "Egypte",         flag: "eg", over05: 85, strength: 65 },

  ],
  "Groupe H": [
    { name: "Espagne",        flag: "es", over05: 98, strength: 92 },
    { name: "Uruguay",        flag: "uy", over05: 91, strength: 76 },
    { name: "Arabie Saoudite",flag: "sa", over05: 82, strength: 60 },
    { name: "Cap-Vert",       flag: "cv", over05: 81, strength: 57 }
  ],
  "Groupe I": [
    { name: "France",         flag: "fr", over05: 97, strength: 91 },
    { name: "Senegal",        flag: "sn", over05: 87, strength: 71 },
    { name: "Norvege",        flag: "no", over05: 91, strength: 78 },
    { name: "Irak",           flag: "iq", over05: 80, strength: 54 }
  ],
  "Groupe J": [
    { name: "Argentine",      flag: "ar", over05: 96, strength: 93 },
    { name: "Algerie",        flag: "dz", over05: 87, strength: 68 },
    { name: "Autriche",       flag: "at", over05: 89, strength: 72 },
    { name: "Jordanie",       flag: "jo", over05: 79, strength: 52 }
  ],
  "Groupe K": [
    { name: "Portugal",       flag: "pt", over05: 96, strength: 88 },
    { name: "RD Congo",       flag: "cd", over05: 82, strength: 59 },
    { name: "Ouzbekistan",    flag: "uz", over05: 83, strength: 60 },
    { name: "Colombie",       flag: "co", over05: 90, strength: 77 }
  ],
  "Groupe L": [
    { name: "Angleterre",     flag: "gb-eng", over05: 95, strength: 87 },
    { name: "Croatie",        flag: "hr", over05: 89, strength: 76 },
    { name: "Ghana",          flag: "gh", over05: 84, strength: 62 },
    { name: "Panama",         flag: "pa", over05: 80, strength: 53 }
  ]
};

const ALL_TEAMS = Object.values(WC_GROUPS).flat();

function flagImg(code) {
  return `<img src="https://flagcdn.com/32x24/${code}.png" style="width:24px;height:18px;border-radius:3px;object-fit:cover">`;
}

// ===== TABS =====
function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['paris','worldcup','simulator'][i] === tab);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'worldcup')  renderWCTeams();
  if (tab === 'simulator') renderSimStart();
}

// ===== PARIS DU JOUR =====
function formHtml(arr) {
  return arr.map(r => r === "V" ? "🟢" : r === "N" ? "🟡" : "🔴").join(" ");
}

function renderMatch(m) {
  const time = new Date(m.utcDate).toLocaleTimeString('fr-FR', {
    hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Paris'
  });
  const o = m.over05  >= 93 ? 'sure' : m.over05  >= 85 ? 'bon' : 'ok';
  const u = m.under35 >= 90 ? 'sure' : m.under35 >= 80 ? 'bon' : 'ok';
  return `
    <div class="match-card">
      <div class="league">${m.league}</div>
      <div class="teams">${m.homeTeam} <span style="color:#444;font-weight:400">vs</span> ${m.awayTeam}</div>
      <div class="form-row">
        <span class="team-name">${m.homeTeam.split(' ').slice(0,2).join(' ')}</span>
        <span class="form">${formHtml(m.home.form)}</span>
        <span class="goals-info">+${m.home.goalsScored} -${m.home.goalsConceded}</span>
      </div>
      <div class="form-row">
        <span class="team-name">${m.awayTeam.split(' ').slice(0,2).join(' ')}</span>
        <span class="form">${formHtml(m.away.form)}</span>
        <span class="goals-info">+${m.away.goalsScored} -${m.away.goalsConceded}</span>
      </div>
      <div class="divider"></div>
      <div class="stats">
        <div class="stat-pill ${o}">
          <div class="label">Over 0.5</div>
          <div class="value">${m.over05}%</div>
          <div class="badge">${m.over05Badge}</div>
        </div>
        <div class="stat-pill ${u}">
          <div class="label">Under 3.5</div>
          <div class="value">${m.under35}%</div>
          <div class="badge">${m.under35Badge}</div>
        </div>
      </div>
      <div class="match-time">🕐 ${time}</div>
    </div>`;
}

async function loadMatches() {
  const container = document.getElementById('matches-container');
  const dateBadge = document.getElementById('date-badge');
  container.innerHTML = `
    <div class="loader">
      <div class="spinner"></div>
      Analyse des 6 championnats...<br>
      <small style="color:#333;margin-top:8px;display:block">10-15 secondes</small>
    </div>`;
  try {
    const res  = await fetch('/.netlify/functions/matches?path=smart-matches');
    const data = await res.json();
    const d = new Date();
    dateBadge.textContent = d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
    if (!data.matches?.length) {
      container.innerHTML = `<div class="empty-box"><div style="font-size:40px;margin-bottom:12px">😴</div>Aucun match fiable aujourd'hui</div>`;
      return;
    }
    const sure = data.matches.filter(m => m.over05 >= 93);
    const bon  = data.matches.filter(m => m.over05 >= 80 && m.over05 < 93);
    let html = '';
    if (sure.length) { html += `<div class="section-title">🔥 Tres surs — Over 0.5</div>`; html += sure.map(renderMatch).join(''); }
    if (bon.length)  { html += `<div class="section-title">✅ Bons paris</div>`;            html += bon.map(renderMatch).join(''); }
    container.innerHTML = html;
  } catch (err) {
    container.innerHTML = `
      <div class="error-box">
        ⚠️ Erreur de connexion<br>
        <small>${err.message}</small><br>
        <button onclick="loadMatches()">🔄 Reessayer</button>
      </div>`;
  }
}

// ===== COUNTDOWN =====
function updateCountdown() {
  const diff = new Date('2026-06-11T00:00:00') - new Date();
  const el   = document.getElementById('wc-countdown');
  if (!el) return;
  if (diff <= 0) { el.textContent = 'Tournoi en cours !'; return; }
  const days  = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  el.textContent = `Debut dans ${days} jours et ${hours}h`;
}

// ===== EQUIPES CdM =====
function renderWCTeams() {
  const container = document.getElementById('wc-teams-container');
  if (container.innerHTML) return;
  let html = '';
  for (const [group, teams] of Object.entries(WC_GROUPS)) {
    html += `<div class="group-title">${group}</div><div class="team-grid">`;
    for (const t of teams) {
      const cls = t.over05 >= 93 ? 'sure' : t.over05 >= 88 ? 'bon' : 'ok';
      html += `
        <div class="team-card" onclick="startSimWith('${t.name}')">
          <div class="team-flag">${flagImg(t.flag)}</div>
          <div class="team-info">
            <div class="team-name-wc">${t.name}</div>
            <div class="team-strength">Force: ${t.strength}/100</div>
          </div>
          <div class="over05-badge ${cls}">${t.over05}%</div>
        </div>`;
    }
    html += `</div>`;
  }
  container.innerHTML = html;
}

// ===== SIMULATEUR =====
const SIM_ROUNDS = [
  'Groupe - Match 1',
  'Groupe - Match 2',
  'Groupe - Match 3',
  '8emes de finale',
  'Quarts de finale',
  'Demi-finale',
  'FINALE'
];

const STAGE_LABELS = ['Groupes', '8emes', 'Quarts', 'Demies', 'Finale'];

let simState = {
  team: null,
  round: 0,
  path: [],
  eliminated: false,
  groupOpponents: []
};

function getGroupOpponents(teamName) {
  for (const teams of Object.values(WC_GROUPS)) {
    if (teams.find(t => t.name === teamName)) {
      return teams.filter(t => t.name !== teamName);
    }
  }
  return [];
}

function getKnockoutOpponent(myTeam, round) {
  // Exclure l'equipe elle-meme ET tous les adversaires deja rencontres
  const alreadyPlayed = new Set(simState.path.map(p => p.opponent));
  alreadyPlayed.add(myTeam.name);

  const others = ALL_TEAMS.filter(t => !alreadyPlayed.has(t.name));
  const sorted = [...others].sort((a, b) => b.strength - a.strength);

  // Plus on avance, plus les adversaires sont forts
  const topN = Math.ceil(sorted.length * (0.25 + (round - 3) * 0.12));
  const pool = sorted.slice(0, Math.max(topN, 5));

  return pool[Math.floor(Math.random() * pool.length)];
}

function startSimWith(teamName) {
  const team = ALL_TEAMS.find(t => t.name === teamName);
  if (!team) return;
  simState = {
    team,
    round: 0,
    path: [],
    eliminated: false,
    groupOpponents: getGroupOpponents(teamName)
  };
  showTab('simulator');
}

function renderSimStart() {
  const container = document.getElementById('sim-container');
  if (simState.team && !simState.eliminated) { renderSimRound(); return; }
  let html = `<p style="font-size:12px;color:#555;margin-bottom:16px">Choisis ton equipe :</p><div class="team-select-grid">`;
  for (const t of ALL_TEAMS) {
    html += `
      <div class="team-select-btn" onclick="startSimWith('${t.name}')">
        <div class="flag">${flagImg(t.flag)}</div>
        <div class="name">${t.name}</div>
      </div>`;
  }
  html += `</div>`;
  container.innerHTML = html;
}

function getPathLabel(p, index) {
  const isGroupRound = index <= 2;
  if (p.result === 'win')  return '<span style="color:#00ff88">Victoire</span>';
  if (p.result === 'loss') return '<span style="color:#ff6464">Defaite</span>';
  // draw
  return isGroupRound
    ? '<span style="color:#ffc800">Nul</span>'
    : '<span style="color:#ffc800">Pen.</span>';
}

function buildPathSummary() {
  return simState.path.map((p, i) => `
    <div style="font-size:11px;color:#888;margin:5px 0;display:flex;align-items:center;gap:6px">
      <span style="color:#555;min-width:145px;font-size:10px">${p.round}</span>
      ${flagImg(p.oppFlag)} ${p.opponent}
      <span style="margin-left:auto">${getPathLabel(p, i)}</span>
    </div>`).join('');
}

function showEliminated(roundName) {
  const { team } = simState;
  document.getElementById('sim-container').innerHTML = `
    <div class="sim-result" style="border-color:rgba(255,80,80,0.3);background:linear-gradient(135deg,#2e0a0a,#1a0d0d)">
      <div class="trophy">😢</div>
      <div class="result-title" style="color:#ff6464">Elimine — ${roundName}</div>
      <div class="result-sub">${flagImg(team.flag)} ${team.name} sort de la competition</div>
      <div class="path-summary">${buildPathSummary()}</div>
      <button class="restart-btn" style="color:#ff6464;border-color:rgba(255,80,80,0.3)" onclick="resetSim()">Rejouer</button>
    </div>`;
}

function renderSimRound() {
  if (!simState.team || simState.eliminated || simState.round >= SIM_ROUNDS.length) return;

  const container = document.getElementById('sim-container');
  const { team, round, groupOpponents } = simState;
  const isGroup   = round <= 2;
  const roundName = SIM_ROUNDS[round];

  // Choix adversaire
  const opponent  = isGroup ? groupOpponents[round] : getKnockoutOpponent(team, round);
  const winProb   = Math.min(90, Math.max(15, Math.round(50 + (team.strength - opponent.strength) * 0.5)));

  // Barre de progression
  const stageIndex = isGroup ? 0 : round - 2;
  let pathHtml = '<div class="path-tracker">';
  STAGE_LABELS.forEach((r, i) => {
    const cls = i < stageIndex ? 'done' : i === stageIndex ? 'current' : '';
    pathHtml += `<div class="path-step ${cls}">${r}</div>`;
  });
  pathHtml += '</div>';

  const drawLabel = isGroup ? 'Nul' : 'Pen. (apres nul)';
  const lossNote  = isGroup
    ? `<div style="font-size:10px;color:#555;margin-top:8px;text-align:center">⚠️ 2 defaites en poule = elimination</div>`
    : '';

  container.innerHTML = `
    ${pathHtml}
    <div class="sim-step">
      <div class="step-label">${roundName}</div>
      <div class="step-match" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        ${flagImg(team.flag)} <strong>${team.name}</strong>
        <span style="color:#444">vs</span>
        ${flagImg(opponent.flag)} <strong>${opponent.name}</strong>
      </div>
      <div style="font-size:11px;color:#555;margin:8px 0 4px">
        Force ${team.strength}/100 vs ${opponent.strength}/100
      </div>
      <div style="font-size:13px;color:#00ff88;font-weight:700;margin-bottom:14px">
        Probabilite victoire : ${winProb}%
      </div>
      <p style="font-size:12px;color:#888;margin-bottom:10px">Quel est le resultat ?</p>
      <div class="result-btns">
        <button class="result-btn win"  onclick="simChoose('win',  '${opponent.name}', '${opponent.flag}')">Victoire</button>
        <button class="result-btn draw" onclick="simChoose('draw', '${opponent.name}', '${opponent.flag}')">${drawLabel}</button>
        <button class="result-btn loss" onclick="simChoose('loss', '${opponent.name}', '${opponent.flag}')">Defaite</button>
      </div>
      ${lossNote}
    </div>`;
}

function simChoose(result, oppName, oppFlag) {
  const { team, round } = simState;
  const isGroup   = round <= 2;
  const roundName = SIM_ROUNDS[round];

  // Enregistrer le resultat
  simState.path.push({ round: roundName, opponent: oppName, oppFlag, result });

  // Defaite en phase elimination directe = sorti
  if (result === 'loss' && !isGroup) {
    simState.eliminated = true;
    showEliminated(roundName);
    return;
  }

  simState.round++;

  // Fin des 3 matchs de groupes → verifier qualification
  if (round === 2) {
    const losses = simState.path.filter(p => p.result === 'loss').length;
    const wins   = simState.path.filter(p => p.result === 'win').length;
    const draws  = simState.path.filter(p => p.result === 'draw').length;

    if (losses >= 2) {
      simState.eliminated = true;
      document.getElementById('sim-container').innerHTML = `
        <div class="sim-result" style="border-color:rgba(255,80,80,0.3);background:linear-gradient(135deg,#2e0a0a,#1a0d0d)">
          <div class="trophy">😢</div>
          <div class="result-title" style="color:#ff6464">Elimine en phase de groupes</div>
          <div class="result-sub">${wins}V ${draws}N ${losses}D — pas qualifie</div>
          <div class="path-summary">${buildPathSummary()}</div>
          <button class="restart-btn" style="color:#ff6464;border-color:rgba(255,80,80,0.3)" onclick="resetSim()">Rejouer</button>
        </div>`;
      return;
    }

    const qualMsg = wins === 3 ? '🔥 1er du groupe !'
                  : wins === 2 ? '✅ Qualifie en 2e position'
                  : wins === 1 ? '⚠️ Qualifie comme meilleur 3e'
                  : '⚠️ Qualifie de justesse';

    document.getElementById('sim-container').innerHTML = `
      <div class="sim-step" style="text-align:center;padding:28px">
        <div style="font-size:36px;margin-bottom:12px">✅</div>
        <div style="font-size:17px;font-weight:900;color:#00ff88;margin-bottom:8px">Qualification !</div>
        <div style="font-size:13px;color:#888">${qualMsg}</div>
        <div style="font-size:12px;color:#555;margin-top:6px">${wins}V ${draws}N ${losses}D en phase de groupes</div>
        <div style="margin-top:16px;padding:12px;background:rgba(0,0,0,0.3);border-radius:10px;text-align:left">
          ${buildPathSummary()}
        </div>
        <button onclick="continueToKnockout()" style="margin-top:20px;background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:#00ff88;border-radius:10px;padding:12px 28px;font-size:13px;font-weight:700;cursor:pointer">
          Continuer vers les 8emes →
        </button>
      </div>`;
    return;
  }

  // Champion du monde !
  if (simState.round >= SIM_ROUNDS.length) {
    document.getElementById('sim-container').innerHTML = `
      <div class="sim-result">
        <div class="trophy">🏆</div>
        <div class="result-title">CHAMPION DU MONDE !</div>
        <div class="result-sub" style="margin-top:6px">${flagImg(team.flag)} ${team.name} remporte la Coupe du Monde 2026</div>
        <div class="path-summary">${buildPathSummary()}</div>
        <button class="restart-btn" onclick="resetSim()">Nouvelle simulation</button>
      </div>`;
    return;
  }

  renderSimRound();
}

function continueToKnockout() {
  renderSimRound();
}

function resetSim() {
  simState = { team: null, round: 0, path: [], eliminated: false, groupOpponents: [] };
  renderSimStart();
}

// ===== INIT =====
loadMatches();
updateCountdown();
setInterval(updateCountdown, 60000);
</script>
