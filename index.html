<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4Kbet — Paris du jour</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0d0d1a" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg, #0d0d1a 0%, #1a1a3e 100%);
      border-bottom: 1px solid rgba(0,255,136,0.15);
      padding: 20px 16px 16px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #00ff88;
    }

    .logo span { color: #ffffff; }

    .subtitle {
      font-size: 11px;
      color: #555;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .date-badge {
      display: inline-block;
      background: rgba(0,255,136,0.08);
      border: 1px solid rgba(0,255,136,0.2);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 11px;
      color: #00ff88;
      margin-top: 10px;
      letter-spacing: 1px;
    }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
    }

    /* ===== SECTION TITRE ===== */
    .section-title {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #00ff88;
      margin: 24px 0 12px 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(0,255,136,0.15);
    }

    /* ===== MATCH CARD ===== */
    .match-card {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: transform 0.2s;
    }

    .match-card:hover {
      transform: translateY(-2px);
      border-color: rgba(0,255,136,0.25);
    }

    .match-card .league {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
    }

    .match-card .teams {
      font-size: 16px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 14px;
      line-height: 1.3;
    }

    .match-card .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 12px;
      color: #aaa;
    }

    .match-card .form-row .team-name {
      min-width: 100px;
      max-width: 110px;
      font-weight: 600;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12px;
    }

    .match-card .form {
      font-size: 14px;
      letter-spacing: 2px;
    }

    .match-card .goals-info {
      font-size: 10px;
      color: #555;
      text-align: right;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.05);
      margin: 12px 0;
    }

    /* ===== STAT PILLS ===== */
    .stats {
      display: flex;
      gap: 10px;
    }

    .stat-pill {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 12px 10px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .stat-pill.sure  { border-color: rgba(0,255,136,0.35); }
    .stat-pill.bon   { border-color: rgba(255,200,0,0.35); }
    .stat-pill.ok    { border-color: rgba(255,100,100,0.2); }

    .stat-pill .label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 5px;
    }

    .stat-pill .value {
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
    }

    .stat-pill.sure .value  { color: #00ff88; }
    .stat-pill.bon .value   { color: #ffc800; }
    .stat-pill.ok .value    { color: #ff6464; }

    .stat-pill .badge {
      font-size: 10px;
      margin-top: 4px;
      color: #888;
    }

    .match-time {
      font-size: 10px;
      color: #444;
      text-align: right;
      margin-top: 10px;
    }

    /* ===== LOADER ===== */
    .loader {
      text-align: center;
      padding: 60px 20px;
      color: #555;
      font-size: 13px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(0,255,136,0.1);
      border-top-color: #00ff88;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== ERREUR ===== */
    .error-box {
      background: rgba(255,80,80,0.07);
      border: 1px solid rgba(255,80,80,0.2);
      border-radius: 14px;
      padding: 24px 20px;
      text-align: center;
      color: #ff6464;
      font-size: 14px;
      margin-top: 20px;
    }

    .error-box button {
      margin-top: 14px;
      background: rgba(255,80,80,0.15);
      border: 1px solid rgba(255,80,80,0.3);
      color: #ff6464;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 13px;
      cursor: pointer;
    }

    /* ===== EMPTY STATE ===== */
    .empty-box {
      text-align: center;
      padding: 60px 20px;
      color: #444;
      font-size: 14px;
    }

    .empty-box .emoji { font-size: 40px; margin-bottom: 12px; }

    /* ===== REFRESH BTN ===== */
    .refresh-btn {
      display: block;
      width: 100%;
      margin-top: 24px;
      background: rgba(0,255,136,0.08);
      border: 1px solid rgba(0,255,136,0.2);
      color: #00ff88;
      border-radius: 12px;
      padding: 12px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
    }

    .refresh-btn:hover { background: rgba(0,255,136,0.15); }
  </style>
</head>
<body>

  <header>
    <div class="logo">4K<span>bet</span></div>
    <div class="subtitle">Paris intelligents du jour</div>
    <div class="date-badge" id="date-badge">📅 Chargement...</div>
  </header>

  <div class="container">
    <div id="matches-container">
      <div class="loader">
        <div class="spinner"></div>
        Analyse des 6 championnats en cours...
      </div>
    </div>
    <button class="refresh-btn" onclick="loadMatches()">🔄 Actualiser</button>
  </div>

  <script>
    function renderMatch(m) {
      const time = new Date(m.utcDate).toLocaleTimeString('fr-FR', {
        hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Paris'
      });

      const over05Class  = m.over05  >= 93 ? 'sure' : m.over05  >= 85 ? 'bon' : 'ok';
      const under35Class = m.under35 >= 90 ? 'sure' : m.under35 >= 80 ? 'bon' : 'ok';

      return `
        <div class="match-card">
          <div class="league">${m.league}</div>
          <div class="teams">${m.homeTeam} <span style="color:#444;font-weight:400">vs</span> ${m.awayTeam}</div>

          <div class="form-row">
            <span class="team-name">${m.homeTeam.split(' ').slice(0,2).join(' ')}</span>
            <span class="form">${m.home.formEmoji}</span>
            <span class="goals-info">⚽${m.home.goalsScored} / 🛡️${m.home.goalsConceded}</span>
          </div>
          <div class="form-row">
            <span class="team-name">${m.awayTeam.split(' ').slice(0,2).join(' ')}</span>
            <span class="form">${m.away.formEmoji}</span>
            <span class="goals-info">⚽${m.away.goalsScored} / 🛡️${m.away.goalsConceded}</span>
          </div>

          <div class="divider"></div>

          <div class="stats">
            <div class="stat-pill ${over05Class}">
              <div class="label">⚽ Over 0.5</div>
              <div class="value">${m.over05}%</div>
              <div class="badge">${m.over05Badge}</div>
            </div>
            <div class="stat-pill ${under35Class}">
              <div class="label">🛡️ Under 3.5</div>
              <div class="value">${m.under35}%</div>
              <div class="badge">${m.under35Badge}</div>
            </div>
          </div>

          <div class="match-time">🕐 ${time}</div>
        </div>
      `;
    }

    async function loadMatches() {
      const container = document.getElementById('matches-container');
      const dateBadge = document.getElementById('date-badge');

      container.innerHTML = `
        <div class="loader">
          <div class="spinner"></div>
          Analyse des 6 championnats...<br>
          <small style="color:#333;margin-top:8px;display:block">Peut prendre 10-15 sec</small>
        </div>
      `;

      try {
        const res = await fetch('/.netlify/functions/matches?path=smart-matches');
        const data = await res.json();

        // Date badge
        const d = new Date();
        dateBadge.textContent = `📅 ${d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' })}`;

        if (!data.matches?.length) {
          container.innerHTML = `
            <div class="empty-box">
              <div class="emoji">😴</div>
              Aucun match fiable aujourd'hui<br>
              <small style="color:#333">Réessaie ce soir ou demain</small>
            </div>
          `;
          return;
        }

        const sure = data.matches.filter(m => m.over05 >= 93);
        const bon  = data.matches.filter(m => m.over05 >= 80 && m.over05 < 93);

        let html = '';

        if (sure.length) {
          html += `<div class="section-title">🔥 Très sûrs — Over 0.5</div>`;
          html += sure.map(renderMatch).join('');
        }

        if (bon.length) {
          html += `<div class="section-title">✅ Bons paris</div>`;
          html += bon.map(renderMatch).join('');
        }

        container.innerHTML = html;

      } catch (err) {
        container.innerHTML = `
          <div class="error-box">
            ⚠️ Erreur de connexion<br>
            <small>${err.message}</small>
            <br>
            <button onclick="loadMatches()">🔄 Réessayer</button>
          </div>
        `;
      }
    }

    // Lancement au chargement
    loadMatches();
  </script>

</body>
</html>
