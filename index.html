<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="mobile-web-app-capable" content="yes"/>

<meta name="apple-mobile-web-app-title" content="4Kbet"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<title>4Kbet</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{font-family:'Inter',sans-serif;box-sizing:border-box;}
body{background:#0a0a0f;color:#fff;overflow-x:hidden;}
.glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);}
.glass-strong{background:rgba(255,255,255,0.07);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.12);}
.neon-green{color:#00F5A0;}
.neon-cyan{color:#00C9FF;}
.neon-yellow{color:#FFC800;}
.tab-active{background:linear-gradient(135deg,rgba(0,245,160,0.15),rgba(0,201,255,0.1));border-color:rgba(0,245,160,0.4)!important;color:#00F5A0;}
.pulse-live{animation:pulse-live 1.5s infinite;}
@keyframes pulse-live{0%,100%{opacity:1;box-shadow:0 0 8px #ff4757;}50%{opacity:0.6;box-shadow:0 0 20px #ff4757;}}
.slide-in{animation:slideIn 0.3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.confidence-bar{background:linear-gradient(90deg,#00F5A0,#00C9FF);}
.confidence-bar-yellow{background:linear-gradient(90deg,#FFC800,#FF8C00);}
.confidence-bar-purple{background:linear-gradient(90deg,#A855F7,#EC4899);}
.badge-green{background:rgba(0,245,160,0.15);color:#00F5A0;border:1px solid rgba(0,245,160,0.3);}
.badge-cyan{background:rgba(0,201,255,0.15);color:#00C9FF;border:1px solid rgba(0,201,255,0.3);}
.badge-yellow{background:rgba(255,200,0,0.15);color:#FFC800;border:1px solid rgba(255,200,0,0.3);}
.badge-red{background:rgba(255,71,87,0.15);color:#FF4757;border:1px solid rgba(255,71,87,0.3);}
.badge-purple{background:rgba(168,85,247,0.15);color:#A855F7;border:1px solid rgba(168,85,247,0.3);}
.form-w{background:#00F5A0;color:#0a0a0f;}
.form-d{background:#FFC800;color:#0a0a0f;}
.form-l{background:#FF4757;color:#fff;}
.spinner{border:2px solid rgba(255,255,255,0.1);border-top:2px solid #00F5A0;border-radius:50%;width:24px;height:24px;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(0,245,160,0.3);border-radius:2px;}
.combo-card-green{background:linear-gradient(135deg,rgba(0,245,160,0.08),rgba(0,201,255,0.06));border:1px solid rgba(0,245,160,0.25);}
.combo-card-yellow{background:linear-gradient(135deg,rgba(255,200,0,0.08),rgba(255,140,0,0.06));border:1px solid rgba(255,200,0,0.25);}
.combo-card-purple{background:linear-gradient(135deg,rgba(168,85,247,0.08),rgba(236,72,153,0.06));border:1px solid rgba(168,85,247,0.25);}
</style>
</head>
<body class="min-h-screen">

<header class="glass-strong sticky top-0 z-50 px-4 py-3">
  <div class="max-w-lg mx-auto flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#00F5A0,#00C9FF)">
        <span class="text-black font-black text-sm">4K</span>
      </div>
      <div>
        <span class="font-black text-xl tracking-tight">4K<span class="neon-green">bet</span></span>
        <div id="last-update" class="text-xs text-gray-500">Chargement...</div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <div id="live-indicator" class="hidden flex items-center gap-1 px-2 py-1 rounded-full badge-red text-xs font-bold">
        <div class="w-2 h-2 rounded-full bg-red-400 pulse-live"></div>LIVE
      </div>
      <button onclick="refreshAll()" class="glass p-2 rounded-lg text-gray-400 hover:text-white transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      </button>
    </div>
  </div>
</header>

<nav class="sticky top-[60px] z-40 glass px-4 py-2">
  <div class="max-w-lg mx-auto grid grid-cols-4 gap-1">
    <button onclick="switchTab('live')" id="tab-live" class="tab-btn glass rounded-lg py-2 px-1 text-center text-xs font-semibold transition-all border border-transparent text-gray-400">LIVE</button>
    <button onclick="switchTab('soir')" id="tab-soir" class="tab-btn glass rounded-lg py-2 px-1 text-center text-xs font-semibold transition-all border border-transparent text-gray-400">CE SOIR</button>
    <button onclick="switchTab('today')" id="tab-today" class="tab-btn glass rounded-lg py-2 px-1 text-center text-xs font-semibold transition-all border border-transparent text-gray-400 tab-active">AUJOURD'HUI</button>
    <button onclick="switchTab('cdm')" id="tab-cdm" class="tab-btn glass rounded-lg py-2 px-1 text-center text-xs font-semibold transition-all border border-transparent text-gray-400">CDM 2026</button>
  </div>
</nav>

<main class="max-w-lg mx-auto px-4 py-4 space-y-4">
  <div id="panel-live" class="tab-panel hidden slide-in space-y-3">
    <div class="glass rounded-xl p-4 text-center">
      <div class="font-bold">Matchs en direct</div>
      <div class="text-gray-400 text-sm mt-1">Mise a jour toutes les 2 minutes</div>
    </div>
    <div id="live-matches" class="space-y-3"></div>
  </div>
  <div id="panel-soir" class="tab-panel hidden slide-in space-y-3">
    <div id="combos-soir" class="space-y-3"></div>
    <div id="soir-matches" class="space-y-3"></div>
  </div>
  <div id="panel-today" class="tab-panel slide-in space-y-3">
    <div id="combos-today" class="space-y-3"></div>
    <div id="today-matches" class="space-y-3">
      <div class="flex justify-center py-8"><div class="spinner"></div></div>
    </div>
  </div>
  <div id="panel-cdm" class="tab-panel hidden slide-in space-y-3">
    <div class="glass-strong rounded-xl p-4">
      <div class="mb-3">
        <div class="font-black text-lg">Coupe du Monde 2026</div>
        <div class="text-sm text-gray-400">USA · Canada · Mexique</div>
      </div>
      <div id="cdm-countdown" class="glass rounded-lg p-3 text-center mb-3"></div>
      <div class="text-xs text-gray-500">48 equipes · 11 juin - 19 juillet 2026</div>
    </div>
    <div id="cdm-groups" class="space-y-3"></div>
  </div>
</main>

<script>
const API_KEY = "04b25e0b04144451abb6e47aed171ea4";
const LEAGUES = {
  PL:  {name:"Premier League",   id:2021},
  FL1: {name:"Ligue 1",          id:2015},
  BL1: {name:"Bundesliga",       id:2002},
  PD:  {name:"La Liga",          id:2014},
  PPL: {name:"Liga NOS",         id:2017},
  SA:  {name:"Serie A",          id:2019},
  CL:  {name:"Champions League", id:2001}
};
const WC_TEAMS = {
  "UEFA":["France","Angleterre","Espagne","Portugal","Allemagne","Pays-Bas","Belgique","Croatie","Norvege","Ecosse","Suisse","Autriche","Turquie","Bosnie","Tcheque","Slovaquie"],
  "CAF":["Maroc","Algerie","Senegal","Egypte","Tunisie","Cote d'Ivoire","Ghana","Afrique du Sud","Cap-Vert","RD Congo"],
  "CONMEBOL":["Argentine","Bresil","Colombie","Uruguay","Equateur","Paraguay"],
  "AFC":["Japon","Coree du Sud","Iran","Australie","Arabie Saoudite","Qatar","Ouzbekistan","Jordanie","Irak"],
  "CONCACAF":["Etats-Unis","Canada","Mexique","Panama","Haiti","Curacao"]
};

let liveInterval = null, allMatches = [];

document.addEventListener("DOMContentLoaded", () => {
  initApp();
  renderCDM();
  updateCDMCountdown();
});

async function apiFetch(path) {
  const res = await fetch(`/.netlify/functions/matches?path=${encodeURIComponent(path)}`);
  if (!res.ok) throw new Error(`Erreur ${res.status}`);
  return res.json();
}

async function initApp() {
  await loadMatches();
  startLivePolling();
}

async function loadMatches() {
  try {
    const today = new Date().toISOString().split("T")[0];
    const data = await apiFetch(`matches?date=${today}`);
    const ids = Object.values(LEAGUES).map(l => l.id);
    allMatches = (data.matches || []).filter(m => ids.includes(m.competition?.id));
    processAndRender();
    document.getElementById("last-update").textContent = "Mis a jour " + new Date().toLocaleTimeString("fr-FR", {hour:"2-digit", minute:"2-digit"});
  } catch(e) {
    document.getElementById("today-matches").innerHTML = `
      <div class="glass rounded-xl p-6 text-center">
        <div class="text-3xl mb-2">⚠️</div>
        <div class="text-red-400 font-bold">${e.message}</div>
        <div class="text-gray-500 text-xs mt-2">Verifie ta connexion</div>
        <button onclick="refreshAll()" class="mt-3 px-4 py-2 rounded-lg badge-cyan text-xs font-bold">Reessayer</button>
      </div>`;
  }
}

async function analyzeMatch(match) {
  try {
    const [homeData, awayData] = await Promise.all([
      apiFetch(`teams/${match.homeTeam.id}/matches?status=FINISHED&limit=7`),
      apiFetch(`teams/${match.awayTeam.id}/matches?status=FINISHED&limit=7`)
    ]);
    const hm = (homeData.matches || []).slice(0, 7);
    const am = (awayData.matches || []).slice(0, 7);

    const hg  = hm.map(m => m.homeTeam.id === match.homeTeam.id ? m.score.fullTime.home : m.score.fullTime.away);
    const ag  = am.map(m => m.awayTeam.id === match.awayTeam.id ? m.score.fullTime.away : m.score.fullTime.home);
    const hCg = hm.map(m => m.homeTeam.id === match.homeTeam.id ? m.score.fullTime.away : m.score.fullTime.home);
    const aCg = am.map(m => m.awayTeam.id === match.awayTeam.id ? m.score.fullTime.home : m.score.fullTime.away);

    const hf = hm.map(m => {
      const ih = m.homeTeam.id === match.homeTeam.id;
      const tg = ih ? m.score.fullTime.home : m.score.fullTime.away;
      const og = ih ? m.score.fullTime.away : m.score.fullTime.home;
      return tg > og ? "W" : tg === og ? "D" : "L";
    });
    const af = am.map(m => {
      const ia = m.awayTeam.id === match.awayTeam.id;
      const tg = ia ? m.score.fullTime.away : m.score.fullTime.home;
      const og = ia ? m.score.fullTime.home : m.score.fullTime.away;
      return tg > og ? "W" : tg === og ? "D" : "L";
    });

    const hAvg  = hg.reduce((a,b)=>a+b,0)  / (hg.length||1);
    const aAvg  = ag.reduce((a,b)=>a+b,0)  / (ag.length||1);
    const hCAvg = hCg.reduce((a,b)=>a+b,0) / (hCg.length||1);
    const aCAvg = aCg.reduce((a,b)=>a+b,0) / (aCg.length||1);
    const totalAvg = hAvg + aAvg;
    const hScore = hg.filter(g=>g>0).length;
    const aScore = ag.filter(g=>g>0).length;
    const hWins  = hf.filter(r=>r==="W").length;
    const aWins  = af.filter(r=>"W").length;
    const hDraws = hf.filter(r=>r==="D").length;
    const aDraws = af.filter(r=>r==="D").length;

    // Total buts sur 7 matchs
    const hTotalButs = hg.reduce((a,b)=>a+b,0) + hCg.reduce((a,b)=>a+b,0);
    const aTotalButs = ag.reduce((a,b)=>a+b,0) + aCg.reduce((a,b)=>a+b,0);
    const avgTotalParMatch = (hTotalButs/(hm.length||1) + aTotalButs/(am.length||1)) / 2;

    let confidence = 50, picks = [];

    // TIER 1 — Over 0.5 (safe)
    if (hScore >= 6 && aScore >= 6) { confidence = Math.min(confidence+45,99); picks.push({type:"Over 0.5", badge:"green", tier:1}); }
    else if (hScore >= 5 && aScore >= 5) { confidence = Math.min(confidence+30,90); picks.push({type:"Over 0.5", badge:"green", tier:1}); }
    else if (hScore >= 4 && aScore >= 4) { confidence = Math.min(confidence+15,75); picks.push({type:"Over 0.5", badge:"cyan", tier:1}); }

    // TIER 2 — Over 1.5 / Victoires / BTTS
    if (totalAvg >= 2.5) picks.push({type:"Over 1.5", badge:"yellow", tier:2});
    if (hWins >= 5) picks.push({type:"Victoire "+(match.homeTeam.shortName||match.homeTeam.name), badge:"yellow", tier:2});
    if (aWins >= 5) picks.push({type:"Victoire "+(match.awayTeam.shortName||match.awayTeam.name), badge:"yellow", tier:2});
    if (hScore >= 5 && aScore >= 5 && hCAvg >= 0.8 && aCAvg >= 0.8) picks.push({type:"Les 2 marquent", badge:"yellow", tier:2});

    // TIER 3 — Moins de 3.5 buts (safe, ~75% des matchs)
    if (avgTotalParMatch < 3.5 && hCAvg < 1.8 && aCAvg < 1.8) picks.push({type:"Moins de 3.5", badge:"purple", tier:3});
    // Match nul probable
    if (hDraws >= 3 && aDraws >= 3 && Math.abs(hAvg - aAvg) < 0.5) picks.push({type:"Match Nul", badge:"purple", tier:3});

    return {...match, confidence, picks, homeForm:hf, awayForm:af, homeAvgGoals:hAvg, awayAvgGoals:aAvg};
  } catch(e) {
    return {...match, confidence:50, picks:[], homeForm:[], awayForm:[], homeAvgGoals:0, awayAvgGoals:0};
  }
}

async function processAndRender() {
  document.getElementById("today-matches").innerHTML = `<div class="flex justify-center py-8"><div class="spinner"></div></div>`;
  const limited = allMatches.slice(0, 6);
  const analyzed = [];
  for (const match of limited) {
    const result = await analyzeMatch(match);
    analyzed.push(result);
    await new Promise(r => setTimeout(r, 400));
  }
  analyzed.sort((a, b) => b.confidence - a.confidence);
  const liveM  = analyzed.filter(m => m.status === "IN_PLAY" || m.status === "PAUSED");
  const soirM  = analyzed.filter(m => {
    if (m.status !== "TIMED" && m.status !== "SCHEDULED") return false;
    return new Date(m.utcDate).getHours() >= 17;
  });
  const todayM = analyzed.filter(m => m.status !== "IN_PLAY" && m.status !== "PAUSED");
  renderMatchList(document.getElementById("today-matches"), todayM, "Aucun match programme aujourd'hui");
  renderMatchList(document.getElementById("soir-matches"), soirM, "Aucun match ce soir");
  renderCombos("combos-today", todayM);
  renderCombos("combos-soir", soirM);
  const liveEl = document.getElementById("live-matches");
  if (liveM.length === 0) {
    liveEl.innerHTML = `<div class="glass rounded-xl p-6 text-center text-gray-400"><div class="font-semibold">Aucun match en direct</div><div class="text-xs mt-1">Reviens lors des matchs</div></div>`;
    document.getElementById("live-indicator").classList.add("hidden");
  } else {
    document.getElementById("live-indicator").classList.remove("hidden");
    renderMatchList(liveEl, liveM, "");
  }
}

function renderMatchList(container, matches, emptyMsg) {
  if (!matches.length) {
    container.innerHTML = `<div class="glass rounded-xl p-6 text-center text-gray-400 text-sm">${emptyMsg}</div>`;
    return;
  }
  container.innerHTML = matches.map(m => matchCard(m)).join("");
}

function matchCard(m) {
  const league = Object.values(LEAGUES).find(l => l.id === m.competition?.id) || {name: m.competition?.name};
  const time = new Date(m.utcDate).toLocaleTimeString("fr-FR", {hour:"2-digit", minute:"2-digit"});
  const isLive = m.status === "IN_PLAY" || m.status === "PAUSED";
  const isFinished = m.status === "FINISHED";
  const over05ok = isLive && ((m.score?.fullTime?.home||0)+(m.score?.fullTime?.away||0)) > 0;
  const score = isLive || isFinished
    ? `<span class="text-xl font-black">${m.score?.fullTime?.home??"?"} - ${m.score?.fullTime?.away??"?"}</span>`
    : `<span class="text-xs text-gray-400 font-mono">${time}</span>`;
  const fd = f => f.map(r => `<span class="inline-flex w-6 h-6 rounded-full text-xs font-black items-center justify-center form-${r.toLowerCase()}">${r}</span>`).join("");
  const picks = m.picks?.map(p => `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold badge-${p.badge}">${p.type}</span>`).join("") || "";
  const cc = m.confidence >= 90 ? "#00F5A0" : m.confidence >= 75 ? "#00C9FF" : m.confidence >= 60 ? "#FFC800" : "#A855F7";
  return `<div class="glass rounded-xl p-4 slide-in ${isLive?"border border-red-500/30":""}">
    <div class="flex items-center justify-between mb-3">
      <span class="text-xs px-2 py-0.5 rounded-full badge-${isLive?"red":"cyan"} font-semibold">${isLive?"🔴 LIVE":league.name}</span>
      ${isFinished?`<span class="text-xs text-gray-500">Termine</span>`:""}
    </div>
    <div class="grid grid-cols-3 items-center gap-2 mb-3">
      <div class="text-center">
        <div class="font-bold text-sm">${m.homeTeam?.shortName||m.homeTeam?.name}</div>
        <div class="flex justify-center flex-wrap gap-0.5 mt-1">${fd(m.homeForm?.slice(0,7)||[])}</div>
        <div class="text-xs text-gray-500 mt-1">${m.homeAvgGoals?.toFixed(1)||"?"} buts/m</div>
      </div>
      <div class="text-center">
        ${score}
        ${over05ok?`<div class="text-xs neon-green font-bold mt-1">But ✓</div>`:""}
      </div>
      <div class="text-center">
        <div class="font-bold text-sm">${m.awayTeam?.shortName||m.awayTeam?.name}</div>
        <div class="flex justify-center flex-wrap gap-0.5 mt-1">${fd(m.awayForm?.slice(0,7)||[])}</div>
        <div class="text-xs text-gray-500 mt-1">${m.awayAvgGoals?.toFixed(1)||"?"} buts/m</div>
      </div>
    </div>
    ${picks?`<div class="flex flex-wrap gap-1.5 mb-3">${picks}</div>`:""}
    <div class="flex items-center gap-2">
      <div class="flex-1 bg-white/5 rounded-full h-1.5">
        <div class="confidence-bar h-1.5 rounded-full" style="width:${m.confidence}%"></div>
      </div>
      <span class="text-xs font-bold" style="color:${cc}">${m.confidence}%</span>
    </div>
  </div>`;
}

function renderCombos(id, matches) {
  const el = document.getElementById(id);
  el.innerHTML = "";
  const top1 = matches.filter(m => m.picks?.some(p => p.tier===1)).slice(0,4);
  if (top1.length >= 2) el.innerHTML += comboCard(top1, "Over 0.5 — Securise", "green", "⚡", 1.06, "green", 1);
  const top2 = matches.filter(m => m.picks?.some(p => p.tier===2)).slice(0,4);
  if (top2.length >= 2) el.innerHTML += comboCard(top2, "Over 1.5 / Victoires", "yellow", "🎯", 1.15, "yellow", 2);
  const top3 = matches.filter(m => m.picks?.some(p => p.tier===3)).slice(0,4);
  if (top3.length >= 2) el.innerHTML += comboCard(top3, "Moins de 3.5 buts", "purple", "🛡️", 1.10, "purple", 3);
}

function comboCard(matches, label, color, icon, baseOdds, theme, tier) {
  const odds = (baseOdds ** matches.length).toFixed(2);
  const conf = Math.round(matches.reduce((a, m) => a * m.confidence / 100, 1) * 100);
  const barClass = theme==="yellow" ? "confidence-bar-yellow" : theme==="purple" ? "confidence-bar-purple" : "confidence-bar";
  const textColor = theme==="green" ? "#00F5A0" : theme==="yellow" ? "#FFC800" : "#A855F7";
  const picks = matches.map(m => {
    const pick = m.picks?.find(p => p.tier===tier) || m.picks?.[0];
    return `<div class="flex items-center gap-2 py-1.5 border-b border-white/5 last:border-0">
      <span class="text-xs badge-${color} px-2 py-0.5 rounded-full whitespace-nowrap">${pick?.type||"Pick"}</span>
      <span class="text-xs font-semibold flex-1">${m.homeTeam?.shortName} vs ${m.awayTeam?.shortName}</span>
      <span class="text-xs font-bold" style="color:${textColor}">${m.confidence}%</span>
    </div>`;
  }).join("");
  return `<div class="combo-card-${theme} rounded-xl p-4">
    <div class="flex items-center gap-2 mb-3">
      <div>
        <div class="font-black text-sm" style="color:${textColor}">${icon} COMBINE — ${label}</div>
        <div class="text-xs text-gray-400">${matches.length} selections · ~75% de reussite</div>
      </div>
      <div class="ml-auto text-right">
        <div class="font-black text-lg neon-cyan">x${odds}</div>
        <div class="text-xs text-gray-400">cote estimee</div>
      </div>
    </div>
    ${picks}
    <div class="mt-3 flex items-center gap-2">
      <div class="flex-1 bg-white/5 rounded-full h-2">
        <div class="${barClass} h-2 rounded-full" style="width:${conf}%"></div>
      </div>
      <span class="text-xs font-black" style="color:${textColor}">${conf}% fiabilite</span>
    </div>
  </div>`;
}

function renderCDM() {
  document.getElementById("cdm-groups").innerHTML = Object.entries(WC_TEAMS).map(([conf, teams]) => `
    <div class="glass rounded-xl p-4">
      <div class="flex items-center gap-2 mb-3">
        <span class="font-bold text-sm">${conf}</span>
        <span class="text-xs text-gray-500 ml-auto">${teams.length} equipes</span>
      </div>
      <div class="flex flex-wrap gap-1.5">
        ${teams.map(t=>`<span class="glass px-2.5 py-1 rounded-lg text-xs font-medium text-gray-300">${t}</span>`).join("")}
      </div>
    </div>`).join("");
}

function updateCDMCountdown() {
  const diff = new Date("2026-06-11T00:00:00") - new Date();
  const el = document.getElementById("cdm-countdown");
  if (diff <= 0) { el.innerHTML=`<div class="neon-green font-black text-lg">🏆 Coupe du Monde EN COURS !</div>`; return; }
  const days = Math.floor(diff/86400000);
  const hours = Math.floor((diff%86400000)/3600000);
  el.innerHTML = `
    <div class="text-xs text-gray-400 mb-2">Debut dans</div>
    <div class="flex justify-center gap-4">
      <div><div class="font-black text-2xl neon-green">${days}</div><div class="text-xs text-gray-500">jours</div></div>
      <div class="text-gray-600 text-2xl">:</div>
      <div><div class="font-black text-2xl neon-cyan">${hours}</div><div class="text-xs text-gray-500">heures</div></div>
    </div>`;
}

function switchTab(tab) {
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.add("hidden"));
  document.querySelectorAll(".tab-btn").forEach(b=>{b.classList.remove("tab-active","text-white");b.classList.add("text-gray-400");});
  document.getElementById("panel-"+tab).classList.remove("hidden");
  document.getElementById("tab-"+tab).classList.add("tab-active","text-white");
}

function startLivePolling() {
  if (liveInterval) clearInterval(liveInterval);
  liveInterval = setInterval(loadMatches, 120000);
}

function refreshAll() { loadMatches(); }
setInterval(updateCDMCountdown, 60000);
</script>
</body>
</html>
